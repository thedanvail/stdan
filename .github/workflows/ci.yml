name: Static Analysis

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  LLVM_VERSION: 22

jobs:
  analyze:
    runs-on: ubuntu-24.04
    env:
      CC: gcc
      CXX: g++
    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          submodules: recursive
          persist-credentials: false

      - name: Install LLVM ${{ env.LLVM_VERSION }} toolchain
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y ca-certificates curl gnupg cppcheck jq
          curl -fsSL https://apt.llvm.org/llvm-snapshot.gpg.key \
            | sudo gpg --dearmor -o /usr/share/keyrings/llvm.gpg
          . /etc/os-release
          echo "deb [signed-by=/usr/share/keyrings/llvm.gpg] http://apt.llvm.org/${VERSION_CODENAME}/ llvm-toolchain-${VERSION_CODENAME}-${LLVM_VERSION} main" \
            | sudo tee /etc/apt/sources.list.d/llvm.list >/dev/null
          sudo apt-get update
          sudo apt-get install -y \
            "clang-tidy-$LLVM_VERSION"

      - name: Show toolchain versions
        run: |
          gcc --version
          g++ --version
          cmake --version
          "clang-tidy-$LLVM_VERSION" --version

      - name: Prepare repo CI workspace
        run: |
          make clean
          make cc

      - name: Run clang-tidy
        run: make tidy CLANG_TIDY="clang-tidy-$LLVM_VERSION"

      - name: Run cppcheck
        run: make cppcheck

      - name: Run tests
        run: make test
