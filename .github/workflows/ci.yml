name: Static Analysis

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  LLVM_VERSION: 22
  GCC_VERSION: 14

jobs:
  analyze:
    runs-on: ubuntu-24.04
    env:
      CC: gcc-14
      CXX: g++-14
    steps:
      - name: Checkout Code
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
        with:
          submodules: recursive
          persist-credentials: false

      - name: Install LLVM ${{ env.LLVM_VERSION }} and GCC ${{ env.GCC_VERSION }}
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y wget gnupg cppcheck jq "gcc-$GCC_VERSION" "g++-$GCC_VERSION"
          wget -q https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh "$LLVM_VERSION"
          rm -f llvm.sh
          sudo apt-get install -y "clang-tidy-$LLVM_VERSION"

      - name: Select LLVM ${{ env.LLVM_VERSION }} toolchain
        run: |
          set -e
          sudo update-alternatives --install /usr/bin/clang clang "/usr/bin/clang-$LLVM_VERSION" 100
          sudo update-alternatives --install /usr/bin/clang++ clang++ "/usr/bin/clang++-$LLVM_VERSION" 100
          sudo update-alternatives --install /usr/bin/clang-tidy clang-tidy "/usr/bin/clang-tidy-$LLVM_VERSION" 100
          clang --version
          clang++ -v
          clang-tidy --version

      - name: Generate Compile Commands
        run: make cc

      - name: Show clang-tidy Version
        run: clang-tidy-22 --version

      - name: Run Clang-Tidy
        run: |
          jq -r '.[] | .file | select(contains("/vendor/") | not) | select(test("\\.(cpp|cc|cxx)$"))' compile_commands.json \
            | sort -u \
            | xargs -r clang-tidy-22 -p . --checks='-*,clang-analyzer-*' --warnings-as-errors=*

      - name: Run Cppcheck
        run: |
          cppcheck --enable=all --suppress=missingInclude --suppress=missingIncludeSystem --suppress=unusedFunction --error-exitcode=1 -i vendor -i build src include

      - name: Run Unit Tests
        run: make test
