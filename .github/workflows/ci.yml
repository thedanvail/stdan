name: Static Analysis

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  LLVM_VERSION: 22

jobs:
  analyze:
    runs-on: ubuntu-24.04
    env:
      CC: gcc
      CXX: g++
      CLANG_TIDY: clang-tidy-22
    steps:
      - name: Checkout Code
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
        with:
          submodules: recursive
          persist-credentials: false

      - name: Install LLVM ${{ env.LLVM_VERSION }} toolchain
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y ca-certificates curl gnupg cppcheck jq
          curl -fsSL https://apt.llvm.org/llvm-snapshot.gpg.key \
            | sudo gpg --dearmor -o /usr/share/keyrings/llvm.gpg
          . /etc/os-release
          echo "deb [signed-by=/usr/share/keyrings/llvm.gpg] http://apt.llvm.org/${VERSION_CODENAME}/ llvm-toolchain-${VERSION_CODENAME}-${LLVM_VERSION} main" \
            | sudo tee /etc/apt/sources.list.d/llvm.list >/dev/null
          sudo apt-get update
          sudo apt-get install -y \
            "clang-tidy-$LLVM_VERSION"

      - name: Show toolchain versions
        run: |
          gcc --version
          g++ --version
          cmake --version
          "$CLANG_TIDY" --version

      - name: Run repo CI target
        run: make ci CLANG_TIDY="$CLANG_TIDY"
