name: Static Analysis

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  LLVM_VERSION: 18
  GCC_VERSION: 14

jobs:
  analyze:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          persist-credentials: false

      - name: Install LLVM ${{ env.LLVM_VERSION }} and GCC ${{ env.GCC_VERSION }}
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y wget software-properties-common gnupg cppcheck
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update
          sudo apt-get install -y "gcc-$GCC_VERSION" "g++-$GCC_VERSION"
          wget -q https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh "$LLVM_VERSION"
          rm -f llvm.sh
          sudo apt-get install -y "clang-tidy-$LLVM_VERSION"

      - name: Select LLVM ${{ env.LLVM_VERSION }} and GCC ${{ env.GCC_VERSION }} toolchains
        run: |
          set -e
          sudo update-alternatives --install /usr/bin/clang clang "/usr/bin/clang-$LLVM_VERSION" 100
          sudo update-alternatives --install /usr/bin/clang++ clang++ "/usr/bin/clang++-$LLVM_VERSION" 100
          sudo update-alternatives --install /usr/bin/clang-tidy clang-tidy "/usr/bin/clang-tidy-$LLVM_VERSION" 100
          sudo update-alternatives --install /usr/bin/gcc gcc "/usr/bin/gcc-$GCC_VERSION" 100
          sudo update-alternatives --install /usr/bin/g++ g++ "/usr/bin/g++-$GCC_VERSION" 100
          GCC_INSTALL_DIR=$(dirname "$(g++ -print-libgcc-file-name)")
          echo "GCC_INSTALL_DIR=$GCC_INSTALL_DIR" >> "$GITHUB_ENV"
          clang --version
          clang++ -v
          gcc --version
          g++ --version
          clang-tidy --version
          echo "Resolved GCC install dir: $GCC_INSTALL_DIR"

      - name: Generate Compile Commands
        run: |
          make cc CMAKE_ARGS="-DCMAKE_C_FLAGS=--gcc-install-dir=$GCC_INSTALL_DIR -DCMAKE_CXX_FLAGS=--gcc-install-dir=$GCC_INSTALL_DIR"

      - name: Run Clang-Tidy
        run: |
          find src include -path "*/vendor" -prune -o -type f \( -name "*.cpp" -o -name "*.h" \) ! -path "src/main.cpp" -print | xargs clang-tidy -p . --checks='-*,clang-analyzer-*' --warnings-as-errors=* -extra-arg-before=--gcc-install-dir=$GCC_INSTALL_DIR -extra-arg=-std=c++23

      - name: Run Cppcheck
        run: |
          cppcheck --enable=all --suppress=missingInclude --suppress=missingIncludeSystem --suppress=unusedFunction --error-exitcode=1 -i vendor -i build src include

      - name: Run Unit Tests
        run: |
          make test CMAKE_ARGS="-DCMAKE_C_FLAGS=--gcc-install-dir=$GCC_INSTALL_DIR -DCMAKE_CXX_FLAGS=--gcc-install-dir=$GCC_INSTALL_DIR"
