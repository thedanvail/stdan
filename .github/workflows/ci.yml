name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  LLVM_VERSION: 22

jobs:
  Linux (GCC 14):
    runs-on: ubuntu-24.04
    env:
      CC: gcc-14
      CXX: g++-14
    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          submodules: recursive
          persist-credentials: false

      - name: Install toolchains
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y ca-certificates curl gnupg cppcheck jq g++-14
          curl -fsSL https://apt.llvm.org/llvm-snapshot.gpg.key \
            | sudo gpg --dearmor -o /usr/share/keyrings/llvm.gpg
          . /etc/os-release
          echo "deb [signed-by=/usr/share/keyrings/llvm.gpg] http://apt.llvm.org/${VERSION_CODENAME}/ llvm-toolchain-${VERSION_CODENAME}-${LLVM_VERSION} main" \
            | sudo tee /etc/apt/sources.list.d/llvm.list >/dev/null
          sudo apt-get update
          sudo apt-get install -y \
            "clang-tidy-$LLVM_VERSION"

      - name: Show toolchain versions
        run: |
          gcc-14 --version
          g++-14 --version
          cmake --version
          "clang-tidy-$LLVM_VERSION" --version

      - name: Prepare repo CI workspace
        run: |
          make clean
          make cc

      - name: Run clang-tidy
        run: make tidy CLANG_TIDY="clang-tidy-$LLVM_VERSION"

      - name: Run cppcheck
        run: make cppcheck

      - name: Run tests
        run: make test

  Windows (Visual Studio 2022):
    runs-on: windows-2022
    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          submodules: recursive
          persist-credentials: false

      - name: Show toolchain versions
        shell: pwsh
        run: |
          cmake --version
          & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" `
            -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 `
            -property installationVersion

      - name: Configure
        shell: pwsh
        run: |
          cmake -S . -B build `
            -G "Visual Studio 17 2022" -A x64 `
            -DSTDAN_BUILD_TESTS=ON

      - name: Build tests
        shell: pwsh
        run: cmake --build build --config Debug --target stdan_tests --parallel

      - name: Run tests
        shell: pwsh
        run: ctest --test-dir build -C Debug --output-on-failure
