name: Static Analysis

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  LLVM_VERSION: 18
  CMAKE_ARGS: -DCMAKE_CXX_FLAGS=-stdlib=libc++

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          persist-credentials: false

      - name: Install LLVM ${{ env.LLVM_VERSION }}
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y wget software-properties-common gnupg cppcheck
          wget -q https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh "$LLVM_VERSION"
          rm -f llvm.sh
          sudo apt-get install -y "clang-tidy-$LLVM_VERSION" "libc++-$LLVM_VERSION-dev" "libc++abi-$LLVM_VERSION-dev"

      - name: Select LLVM ${{ env.LLVM_VERSION }} Toolchain
        run: |
          set -e
          sudo update-alternatives --install /usr/bin/clang clang "/usr/bin/clang-$LLVM_VERSION" 100
          sudo update-alternatives --install /usr/bin/clang++ clang++ "/usr/bin/clang++-$LLVM_VERSION" 100
          sudo update-alternatives --install /usr/bin/clang-tidy clang-tidy "/usr/bin/clang-tidy-$LLVM_VERSION" 100
          clang --version
          clang-tidy --version

      - name: Generate Compile Commands
        run: make cc

      - name: Run Clang-Tidy
        run: |
          find src include -path "*/vendor" -prune -o -type f \( -name "*.cpp" -o -name "*.h" \) -print | xargs clang-tidy -p . --checks='-*,clang-analyzer-*' --warnings-as-errors=* -extra-arg=-std=c++23 -extra-arg=-stdlib=libc++

      - name: Run Cppcheck
        run: |
          cppcheck --enable=all --suppress=missingInclude --suppress=missingIncludeSystem --suppress=unusedFunction --error-exitcode=1 -i vendor -i build src include
